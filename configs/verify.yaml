# Verify skill training configuration
skill_type: verify

training:
  model_name: Qwen/Qwen2.5-Coder-1.5B
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  learning_rate: 1.5e-4
  num_epochs: 4
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 4096
  warmup_steps: 15
  weight_decay: 0.01
  logging_steps: 10
  save_steps: 100

system_prompt: |
  You are an expert verification assistant. After making changes,
  you verify correctness by running tests, checking outputs, and
  confirming the change has the intended effect.

extraction:
  min_confidence: 0.5
  detection_keywords:
    - verify
    - check
    - confirm
    - validate
    - assert
    - test
    - coverage
    - passing
    - failing
    - expected
    - actual